{{ define "main" }}
<article class="about-page">
  <div class="article about-body">
    <h2 id="about-me">About me</h2>
    {{- with .Resources.GetMatch "about-photo.jpg" }}
    <img src="{{ .Permalink }}" alt="Alexander Wang" class="about-photo" />
    {{- end }}
    {{ .Content }}
  </div>
  {{- partial "about-footer.html" . }}
</article>
{{ end }}
