{{- $current := .current | default "" -}}
<ul id="tag-nav">
  {{- range site.Params.personal_tag_nav.tags }}
  {{- $term := . }}
  {{- $slug := $term | urlize }}
  <li>
    {{- if eq $current $term }}
    <span class="tag-current">{{ $term }}</span>
    {{- else }}
    <a href="{{ relLangURL (printf "personal/topic/%s/" $slug) }}">{{ $term }}</a>
    {{- end }}
  </li>
  {{- end }}
</ul>
